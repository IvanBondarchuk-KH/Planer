{% extends "base.html" %}

{% block title %}Бібліотека{% endblock %}

{% block content %}
    <h1>Бібліотека</h1>

    <form action="{{ url_for('add_book') }}" method="post" class="add-task-form">
        <input type="text" name="title" placeholder="Назва книги" required>
        <input type="text" name="author" placeholder="Автор" required>
        <input type="number" name="year" placeholder="Рік видання">
        <input type="text" name="image_url" placeholder="URL зображення обкладинки">
        <textarea name="description" placeholder="Опис книги"></textarea>
        <button type="submit">Додати книгу</button>
    </form>

    <h2>Список книг</h2>
    <div class="book-grid">
        {% for book in books %}
            <div class="book-item {{ 'read-book' if book.is_read == 1 }}">
                <img src="{{ book.image_url }}" class="book-thumb">
                <div class="book-info">
                    <strong>
                        {{ book.title }} 
                        {% if book.is_read == 1 %} ✅ <small>(Прочитано)</small> {% endif %}
                    </strong>
                    <span>{{ book.author }} ({{ book.year }})</span>
                    
                    <div class="book-actions">
                        <form action="{{ url_for('toggle_read', id=book.id) }}" method="post" style="display:inline;">
                            <button type="submit" class="btn-read">
                                {{ 'Прочитано' if book.is_read == 1 else 'Позначити як прочитану' }}
                            </button>
                        </form>

                        <a href="{{ url_for('book_detail', id=book.id) }}" class="btn-detail">Детальніше</a>
                        <a href="{{ url_for('edit_book', id=book.id) }}" class="btn-detail">Редагувати</a>
                        
                        <form action="{{ url_for('delete_book', id=book.id) }}" method="post" style="display:inline;">
                            <button type="submit" class="btn-detail unique" onclick="return confirm('Ви впевнені?');">Видалити</button>
                        </form>
                    </div>
                </div>
            </div>
        {% endfor %}
    </div>
{% endblock %}
