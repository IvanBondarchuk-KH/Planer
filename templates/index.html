<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Планувальник подій</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <h1>Планувальник подій</h1>
        
        <form method="POST" class="event-form">
            <input type="text" name="title" placeholder="Назва події" required>
            <div class="row">
                <input type="date" name="date" required>
                <input type="time" name="time" required>
            </div>
            <select name="priority">
                <option value="Низький">Низький пріоритет</option>
                <option value="Середній" selected>Середній пріоритет</option>
                <option value="Високий">Високий пріоритет</option>
            </select>
            <button type="submit">Додати подію</button>
        </form>

        <div class="events-list">
            {% for event in events %}
            <table class="my-table priority-{{ event.priority }}">
                <tr>
                    <td class="tds-1"><h3>{{ event.title }}</h3></td>
                    <td class="tds-2"><p>📅 {{ event.date }} | ⏰ {{ event.time }}</p></td>
                    <td class="tds-3"><span class="badge">{{ event.priority }}</span></td>
                    <td class="tds-4"><a href="{{ url_for('delete_event', event_id=loop.index0) }}" class="delete-btn">❌</a></td>
                </tr>
            </table>
            {% endfor %}
        </div>
    </div>
</body>
</html>
